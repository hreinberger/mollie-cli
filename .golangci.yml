version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    rules:
      # Allow formatted output in cmd layer
      - path: cmd/
        linters:
          - forbidigo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
